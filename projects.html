<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Projects — Eshaan Sharma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=JetBrains+Mono:wght@400;500&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=27">
</head>
<body>
<main>
  <section style="padding: 160px var(--gutter) 40px 24px;">
    <div class="shell" style="text-align: center;">
      <h1 style="font-family: var(--font-sans); font-weight: 500; font-size: clamp(28px, 3.4vw, 40px); line-height: 1.1; letter-spacing: -0.01em; margin-bottom: 18px;">Things I have built &amp; shipped.</h1>
      <p class="lead" style="max-width: 60ch; margin: 0 auto;">Trading infrastructure, browser-automation tools, and small Sheets-backed analytics jobs. Most are or have been live in production with real money behind them.</p>
    </div>
  </section>

  <div class="section-divider" aria-hidden="true">
    <span class="section-divider__count">06 projects</span>
  </div>

  <section style="padding: 32px var(--gutter) var(--section);">
    <div class="shell shell--narrow">
      <div class="proj-grid reveal" id="grid"></div>
    </div>
  </section>
</main>

<script src="data.js?v=27"></script>
<script src="layout.js?v=27"></script>
<script>
  // simple SVG thumb generators per project — stays minimal, on-brand
  const thumbs = {
    rd: `<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
      <rect width="400" height="200" fill="#14142a"/>
      <g stroke="#a89cf0" stroke-width="0.6" fill="none" opacity="0.5">
        <path d="M20 150 L60 130 L100 140 L140 100 L180 110 L220 70 L260 80 L300 50 L340 60 L380 30"/>
        <path d="M20 170 L60 160 L100 165 L140 150 L180 155 L220 130 L260 135 L300 110 L340 115 L380 90" opacity="0.4"/>
      </g>
      <g fill="#a89cf0">
        <circle cx="60" cy="130" r="2"/><circle cx="140" cy="100" r="2"/><circle cx="220" cy="70" r="3"/><circle cx="300" cy="50" r="2"/><circle cx="380" cy="30" r="2"/>
      </g>
      <text x="20" y="40" font-family="JetBrains Mono" font-size="10" fill="#74717c" letter-spacing="2">RANK · 50ms · 8 ENGINES</text>
    </svg>`,
    sb: `<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
      <rect width="400" height="200" fill="#14142a"/>
      <g stroke="#a89cf0" stroke-width="0.6" fill="none" opacity="0.5">
        <rect x="40" y="60" width="80" height="80" rx="4"/>
        <rect x="160" y="60" width="80" height="80" rx="4"/>
        <rect x="280" y="60" width="80" height="80" rx="4"/>
        <line x1="120" y1="100" x2="160" y2="100"/>
        <line x1="240" y1="100" x2="280" y2="100"/>
      </g>
      <text x="80" y="105" font-family="JetBrains Mono" font-size="9" fill="#a89cf0" text-anchor="middle">live</text>
      <text x="200" y="105" font-family="JetBrains Mono" font-size="9" fill="#a89cf0" text-anchor="middle">api</text>
      <text x="320" y="105" font-family="JetBrains Mono" font-size="9" fill="#a89cf0" text-anchor="middle">backtest</text>
      <text x="20" y="40" font-family="JetBrains Mono" font-size="10" fill="#74717c" letter-spacing="2">3 DOMAINS · 1 INDICATOR LIB</text>
    </svg>`,
    ks: `<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
      <rect width="400" height="200" fill="#14142a"/>
      <g stroke="#d4a8e8" stroke-width="0.6" fill="none" opacity="0.5">
        <circle cx="200" cy="110" r="50"/>
        <circle cx="200" cy="110" r="30"/>
        <line x1="200" y1="60" x2="200" y2="160"/>
        <line x1="150" y1="110" x2="250" y2="110"/>
      </g>
      <circle cx="200" cy="110" r="6" fill="#d4a8e8"/>
      <text x="20" y="40" font-family="JetBrains Mono" font-size="10" fill="#74717c" letter-spacing="2">KILL · &lt;5s · TRIGGER → FLAT</text>
    </svg>`,
    se: `<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
      <rect width="400" height="200" fill="#14142a"/>
      <g fill="#a89cf0" opacity="0.5">
        <rect x="30" y="140" width="20" height="40"/>
        <rect x="60" y="120" width="20" height="60"/>
        <rect x="90" y="100" width="20" height="80"/>
        <rect x="120" y="80" width="20" height="100"/>
        <rect x="150" y="110" width="20" height="70"/>
        <rect x="180" y="90" width="20" height="90"/>
        <rect x="210" y="70" width="20" height="110"/>
        <rect x="240" y="50" width="20" height="130"/>
        <rect x="270" y="80" width="20" height="100"/>
        <rect x="300" y="60" width="20" height="120"/>
        <rect x="330" y="40" width="20" height="140"/>
        <rect x="360" y="70" width="20" height="110"/>
      </g>
      <text x="20" y="30" font-family="JetBrains Mono" font-size="10" fill="#74717c" letter-spacing="2">10-POINT · NIFTY 500 + F&amp;O</text>
    </svg>`,
    oc: `<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
      <rect width="400" height="200" fill="#14142a"/>
      <g stroke="#a89cf0" stroke-width="0.5" fill="none" opacity="0.5">
        <path d="M0 100 Q50 20 100 100 T200 100 T300 100 T400 100"/>
        <path d="M0 100 Q50 180 100 100 T200 100 T300 100 T400 100" opacity="0.5"/>
      </g>
      <g fill="#d4a8e8">
        <circle cx="100" cy="100" r="2"/><circle cx="200" cy="100" r="3"/><circle cx="300" cy="100" r="2"/>
      </g>
      <text x="20" y="30" font-family="JetBrains Mono" font-size="10" fill="#74717c" letter-spacing="2">OPTION CHAIN · WS · PROTOBUF</text>
    </svg>`,
    ds: `<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
      <rect width="400" height="200" fill="#14142a"/>
      <g stroke="#a89cf0" stroke-width="0.4" opacity="0.4">
        ${Array.from({length: 8}, (_, i) => `<line x1="0" y1="${30 + i * 22}" x2="400" y2="${30 + i * 22}"/>`).join('')}
        ${Array.from({length: 12}, (_, i) => `<line x1="${i * 35 + 20}" y1="0" x2="${i * 35 + 20}" y2="200"/>`).join('')}
      </g>
      <g fill="#a89cf0">
        ${Array.from({length: 30}, () => {
          const x = Math.floor(Math.random() * 380 + 10);
          const y = Math.floor(Math.random() * 180 + 10);
          const o = (Math.random() * 0.7 + 0.3).toFixed(2);
          return `<circle cx="${x}" cy="${y}" r="2" opacity="${o}"/>`;
        }).join('')}
      </g>
      <text x="20" y="30" font-family="JetBrains Mono" font-size="10" fill="#74717c" letter-spacing="2">DELIVERY % · NSE · LIVE</text>
    </svg>`,
  };

  const githubIcon = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12c0 4.42 2.87 8.17 6.84 9.5.5.09.66-.22.66-.48v-1.7c-2.78.6-3.37-1.34-3.37-1.34-.45-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.89 1.52 2.34 1.08 2.91.83.09-.65.35-1.08.63-1.33-2.22-.25-4.55-1.11-4.55-4.94 0-1.09.39-1.99 1.03-2.69-.1-.25-.45-1.27.1-2.65 0 0 .84-.27 2.75 1.02.8-.22 1.65-.33 2.5-.33s1.7.11 2.5.33c1.91-1.29 2.75-1.02 2.75-1.02.55 1.38.2 2.4.1 2.65.64.7 1.03 1.6 1.03 2.69 0 3.84-2.34 4.69-4.57 4.93.36.31.68.92.68 1.85V21c0 .27.16.58.67.48A10 10 0 0 0 22 12c0-5.52-4.48-10-10-10z"/></svg>`;
  const playIcon = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
  const linkIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 14a5 5 0 0 1 0-7l3-3a5 5 0 0 1 7 7l-1.5 1.5"/><path d="M14 10a5 5 0 0 1 0 7l-3 3a5 5 0 0 1-7-7l1.5-1.5"/></svg>`;

  document.getElementById('grid').innerHTML = window.PORTFOLIO.projects.map(p => `
    <article class="proj-card">
      <div class="proj-card__thumb">${thumbs[p.thumb] || ''}</div>
      <div class="proj-card__body">
        <div class="proj-card__meta">
          <span>${p.year}</span>
          <span>${p.tagline.length > 60 ? 'flagship' : 'tool'}</span>
        </div>
        <h3 class="proj-card__title">${p.title}</h3>
        <p class="proj-card__tagline">${p.description}</p>
        <div class="proj-card__stack">
          ${p.stack.slice(0, 6).map(s => `<span class="tag">${s}</span>`).join('')}
        </div>
        <div class="proj-card__links">
          <a class="proj-card__link" href="${p.links.github}" target="_blank">${githubIcon}<span>GitHub</span></a>
          <a class="proj-card__link ${p.links.demo === '#' ? 'is-disabled' : ''}" href="${p.links.demo}" target="_blank">${playIcon}<span>Demo</span></a>
          <a class="proj-card__link ${p.links.site === '#' ? 'is-disabled' : ''}" href="${p.links.site}" target="_blank">${linkIcon}<span>Site</span></a>
        </div>
      </div>
    </article>
  `).join('');
</script>
</body>
</html>
