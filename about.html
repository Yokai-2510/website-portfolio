<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>About — Eshaan Sharma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=JetBrains+Mono:wght@400;500&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=27">
</head>
<body>
<main>
  <section style="padding: 160px var(--gutter) 40px 24px;">
    <div class="shell" style="text-align: center;">
      <h1 style="font-family: var(--font-sans); font-weight: 500; font-size: clamp(28px, 3.4vw, 40px); line-height: 1.1; letter-spacing: -0.01em; margin-bottom: 18px;">A note on the work.</h1>
    </div>
  </section>

  <div class="section-divider" aria-hidden="true">
    <span class="section-divider__count">about me</span>
  </div>

  <section style="padding: 32px var(--gutter) var(--section);">
    <div class="shell shell--narrow">

      <div class="about-id reveal">
        <div class="about-id__left">
          <div class="about-id__info">
            <div class="about-id__name serif" id="m-name"></div>
            <div class="about-id__role" id="m-role"></div>
            <div class="about-id__loc" id="m-loc"></div>
          </div>
        </div>

        <div class="about-id__divider" aria-hidden="true"></div>

        <div class="about-id__right">
          <a class="about-cta about-cta--primary" href="" id="m-resume">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M12 18v-6"/><path d="m9 15 3 3 3-3"/></svg>
            <span>Download résumé</span>
          </a>
          <a class="about-cta" href="" id="m-email">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
            <span id="m-email-label"></span>
          </a>
          <div class="about-cta-row">
            <a class="about-cta about-cta--ghost" id="s-gh" target="_blank" aria-label="GitHub">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12c0 4.42 2.87 8.17 6.84 9.5.5.09.66-.22.66-.48v-1.7c-2.78.6-3.37-1.34-3.37-1.34-.45-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.89 1.52 2.34 1.08 2.91.83.09-.65.35-1.08.63-1.33-2.22-.25-4.55-1.11-4.55-4.94 0-1.09.39-1.99 1.03-2.69-.1-.25-.45-1.27.1-2.65 0 0 .84-.27 2.75 1.02.8-.22 1.65-.33 2.5-.33s1.7.11 2.5.33c1.91-1.29 2.75-1.02 2.75-1.02.55 1.38.2 2.4.1 2.65.64.7 1.03 1.6 1.03 2.69 0 3.84-2.34 4.69-4.57 4.93.36.31.68.92.68 1.85V21c0 .27.16.58.67.48A10 10 0 0 0 22 12c0-5.52-4.48-10-10-10z"/></svg>
              <span>GitHub</span>
            </a>
            <a class="about-cta about-cta--ghost" id="s-li" target="_blank" aria-label="LinkedIn">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14zM8.34 18V10H5.67v8h2.67zM7 8.83a1.55 1.55 0 1 0 0-3.1 1.55 1.55 0 0 0 0 3.1zM18.34 18v-4.4c0-2.47-1.32-3.62-3.08-3.62-1.42 0-2.06.78-2.41 1.33V10h-2.67v8h2.67v-4.47c0-.24.02-.48.09-.65.19-.48.63-.98 1.36-.98.96 0 1.34.73 1.34 1.8V18h2.7z"/></svg>
              <span>LinkedIn</span>
            </a>
          </div>
        </div>
      </div>

      <div class="about-body" id="body"></div>

    </div>
  </section>
</main>

<script src="data.js?v=27"></script>
<script src="layout.js?v=27"></script>
<script>
  const D = window.PORTFOLIO;
  document.getElementById('m-name').textContent = D.identity.name;
  document.getElementById('m-role').textContent = D.identity.role;
  document.getElementById('m-loc').textContent = D.identity.location;
  const eBtn = document.getElementById('m-email');
  eBtn.href = 'mailto:' + D.identity.email;
  document.getElementById('m-email-label').textContent = D.identity.email;
  const gh = document.getElementById('s-gh'); gh.href = D.identity.github;
  const li = document.getElementById('s-li'); li.href = D.identity.linkedin;
  document.getElementById('m-resume').href = D.identity.resume;
  document.getElementById('body').innerHTML = D.about.paragraphs.map((p, i) => `<p class="reveal" style="transition-delay: ${i * 80}ms">${p}</p>`).join('');
  if (window.observeReveal) window.observeReveal();
</script>
</body>
</html>
